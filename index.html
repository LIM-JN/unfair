<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unfair</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header></header>
<main class="board">
    <div class="grid">
        <div class="cell" data-node="10">10</div>
        <div class="cell" data-node="9">9</div>
        <div class="cell" data-node="8">8</div>
        <div class="cell" data-node="7">7</div>
        <div class="cell" data-node="6">6</div>
        <div class="cell" data-node="5">5</div>
        <div class="cell" data-node="11">11</div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell" data-node="4">4</div>
        <div class="cell" data-node="12">12</div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell" data-node="3">3</div>
        <div class="cell" data-node="13">13</div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell" data-node="2">2</div>
        <div class="cell" data-node="14">14</div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell nope"></div>
        <div class="cell" data-node="1">1</div>
        <div class="cell" data-node="15">15</div>
        <div class="cell" data-node="16">16</div>
        <div class="cell" data-node="17">17</div>
        <div class="cell" data-node="18">18</div>
        <div class="cell" data-node="19">19</div>
        <div class="cell" data-node="20">20</div>
        <div class="inner-path">
          <!-- 좌하 -> 중앙 -> 우상 대각선 -->
          <div class="inner-cell path1 p1" data-node="105">105</div>
          <div class="inner-cell path1 p2" data-node="104">104</div>
          <div class="inner-cell path1 center" data-node="103">103</div>
          <div class="inner-cell path1 p4" data-node="102">102</div>
          <div class="inner-cell path1 p5" data-node="101">101</div>
    
          <!-- 좌상 -> 중앙 -> 우하 대각선 -->
          <div class="inner-cell path2 q1" data-node="201">201</div>
          <div class="inner-cell path2 q2" data-node="202">202</div>
          <div class="inner-cell path2 q4" data-node="203">203</div>
          <div class="inner-cell path2 q5" data-node="204">204</div>
        </div>
    </div>
    <div class="piece player-a is-home" id="piece-A1" data-piece-id="A1">A1</div>
    <div class="piece player-a is-home" id="piece-A2" data-piece-id="A2">A2</div>
    <div class="piece player-a is-home" id="piece-A3" data-piece-id="A3">A3</div>
    <div class="piece player-a is-home" id="piece-A4" data-piece-id="A4">A4</div>
    <div class="piece player-b is-home" id="piece-B1" data-piece-id="B1">B1</div>
    <div class="piece player-b is-home" id="piece-B2" data-piece-id="B2">B2</div>
    <div class="piece player-b is-home" id="piece-B3" data-piece-id="B3">B3</div>
    <div class="piece player-b is-home" id="piece-B4" data-piece-id="B4">B4</div>
</main>
<section>
<div class="yut-area">
  <p>현재 턴: <span id="turnText">A</span></p>
  <div class="sticks">
    <div class="stick" id="stick1">?</div>
    <div class="stick" id="stick2">?</div>
    <div class="stick" id="stick3">?</div>
    <div class="stick" id="stick4">?</div>
  </div>

  <button id="throwBtn">윷 던지기</button>
  <div class="piece-select">
    <input type="radio" name="p1" id="select-A1" value="A1" checked>
    <label for="select-A1">A1</label>

    <input type="radio" name="p1" id="select-A2" value="A2">
    <label for="select-A2">A2</label>

    <input type="radio" name="p1" id="select-A3" value="A3">
    <label for="select-A3">A3</label>

    <input type="radio" name="p1" id="select-A4" value="A4">
    <label for="select-A4">A4</label>
  </div>
  <div class="piece-select">
    <input type="radio" name="p2" id="select-B1" value="B1" checked disabled>
    <label for="select-B1">B1</label>

    <input type="radio" name="p2" id="select-B2" value="B2" disabled>
    <label for="select-B2">B2</label>

    <input type="radio" name="p2" id="select-B3" value="B3" disabled>
    <label for="select-B3">B3</label>

    <input type="radio" name="p2" id="select-B4" value="B4" disabled>
    <label for="select-B4">B4</label>
  </div>
  <button id="moveBtn" disabled>말 움직이기</button>
  <p id="resultText">결과: -</p>
  <p>
    점수 
    <span id="score1" style="color:crimson">0</span>
     : 
    <span id="score2" style="color:royalblue">0</span>
  </p>
</div>
</section>
<footer></footer>
<script src="./index.js"></script>
</body>
</html>
